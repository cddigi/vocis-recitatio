<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Courier New', Courier, monospace">
  <!-- =====================================================================
       VŌCIS RECITĀTIŌ — UX mockup (1280x720, M5Tab5)
       Palette & layout taken verbatim from config.py (RGB565 -> hex):
         PHOSPHOR_BRIGHT 0x07E0=#00FF00  NEON_CYAN 0x07FF=#00FFFF
         NEON_MAGENTA 0xF81F=#FF00FF      NEON_YELLOW 0xFFE0=#FFFF00
         NEON_ORANGE 0xFD20=#FFA500       NEON_RED 0xF800=#FF0000
       Layout: WAVE(40,80,800x200) STATUS(40,300,800x280)
               LIST(880,80,360x500)  BUTTON_Y=600
       ===================================================================== -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#000000" fill-opacity="0"/>
      <rect width="3" height="1" fill="#000000" fill-opacity="0.30"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="46%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="screenTint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010A03"/>
      <stop offset="100%" stop-color="#000400"/>
    </linearGradient>
  </defs>

  <!-- ===== screen ===== -->
  <rect width="1280" height="720" fill="url(#screenTint)"/>

  <!-- ===== header bar (y 0..60) ===== -->
  <rect x="0" y="0" width="1280" height="60" fill="#04140A"/>
  <line x1="0" y1="60" x2="1280" y2="60" stroke="#00FF00" stroke-opacity="0.55" stroke-width="2"/>
  <text x="24" y="39" font-size="26" fill="#00FF00" filter="url(#glow)" letter-spacing="2">VŌCIS RECITĀTIŌ//v1.0</text>
  <text x="430" y="39" font-size="17" fill="#FF00FF" filter="url(#glow)" letter-spacing="3">[ HACK THE PLANET ]</text>
  <!-- status pill -->
  <circle cx="1006" cy="30" r="7" fill="#00FF00" filter="url(#softglow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="1022" y="36" font-size="18" fill="#00FF00" filter="url(#glow)">PARĀTUS_</text>
  <text x="1148" y="36" font-size="16" fill="#008000">SD▸14.2G</text>

  <!-- ===================================================================
       WAVEFORM panel (40,80,800x200) — center baseline y=180
       =================================================================== -->
  <rect x="40" y="80" width="800" height="200" fill="#020A05" stroke="#00FF00" stroke-opacity="0.45" stroke-width="2" rx="3"/>
  <text x="52" y="100" font-size="13" fill="#008000">// VŌX — WAVEFORM</text>
  <text x="744" y="100" font-size="13" fill="#00FFFF">REC 00:42</text>
  <line x1="48" y1="180" x2="832" y2="180" stroke="#00FF00" stroke-opacity="0.22" stroke-width="1"/>

  <!-- waveform bars (symmetric around y=180) -->
  <g>
    <rect x="56"  y="172" width="9" height="16"  rx="1" fill="#00AA00"/>
    <rect x="75"  y="166" width="9" height="28"  rx="1" fill="#00FF00"/>
    <rect x="94"  y="174" width="9" height="12"  rx="1" fill="#00AA00"/>
    <rect x="113" y="158" width="9" height="44"  rx="1" fill="#00FF00"/>
    <rect x="132" y="150" width="9" height="60"  rx="1" fill="#00FF00"/>
    <rect x="151" y="162" width="9" height="36"  rx="1" fill="#00FF00"/>
    <rect x="170" y="140" width="9" height="80"  rx="1" fill="#00FF00"/>
    <rect x="189" y="152" width="9" height="56"  rx="1" fill="#00FF00"/>
    <rect x="208" y="128" width="9" height="104" rx="1" fill="#00FF00"/>
    <rect x="227" y="144" width="9" height="72"  rx="1" fill="#00FF00"/>
    <rect x="246" y="120" width="9" height="120" rx="1" fill="#00FF00"/>
    <rect x="265" y="136" width="9" height="88"  rx="1" fill="#00FF00"/>
    <rect x="284" y="110" width="9" height="140" rx="1" fill="#00FFFF"/>
    <rect x="303" y="130" width="9" height="100" rx="1" fill="#00FF00"/>
    <rect x="322" y="102" width="9" height="156" rx="1" fill="#00FFFF"/>
    <rect x="341" y="122" width="9" height="116" rx="1" fill="#00FF00"/>
    <rect x="360" y="96"  width="9" height="168" rx="1" fill="#FFFF00"/>
    <rect x="379" y="118" width="9" height="124" rx="1" fill="#00FF00"/>
    <rect x="398" y="100" width="9" height="160" rx="1" fill="#00FFFF"/>
    <rect x="417" y="125" width="9" height="110" rx="1" fill="#00FF00"/>
    <rect x="436" y="92"  width="9" height="176" rx="1" fill="#FFFF00"/>
    <rect x="455" y="114" width="9" height="132" rx="1" fill="#00FFFF"/>
    <rect x="474" y="90"  width="9" height="180" rx="1" fill="#FFFF00"/>
    <rect x="493" y="108" width="9" height="144" rx="1" fill="#00FFFF"/>
    <rect x="512" y="95"  width="9" height="170" rx="1" fill="#FFFF00"/>
    <rect x="531" y="120" width="9" height="120" rx="1" fill="#00FF00"/>
    <rect x="550" y="90"  width="9" height="180" rx="1" fill="#FFFF00"/>
    <rect x="569" y="106" width="9" height="148" rx="1" fill="#00FFFF"/>
    <rect x="588" y="98"  width="9" height="164" rx="1" fill="#FFFF00"/>
    <rect x="607" y="122" width="9" height="116" rx="1" fill="#00FF00"/>
    <rect x="626" y="104" width="9" height="152" rx="1" fill="#00FFFF"/>
    <rect x="645" y="132" width="9" height="96"  rx="1" fill="#00FF00"/>
    <rect x="664" y="116" width="9" height="128" rx="1" fill="#00FF00"/>
    <rect x="683" y="140" width="9" height="80"  rx="1" fill="#00FF00"/>
    <rect x="702" y="130" width="9" height="100" rx="1" fill="#00FF00"/>
    <rect x="721" y="150" width="9" height="60"  rx="1" fill="#00FF00"/>
    <rect x="740" y="142" width="9" height="76"  rx="1" fill="#00FF00"/>
    <rect x="759" y="160" width="9" height="40"  rx="1" fill="#00FF00"/>
    <rect x="778" y="156" width="9" height="48"  rx="1" fill="#00FF00"/>
    <rect x="797" y="170" width="9" height="20"  rx="1" fill="#00AA00"/>
  </g>
  <!-- moving playhead -->
  <line x1="60" y1="90" x2="60" y2="270" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.85" filter="url(#softglow)">
    <animate attributeName="x1" values="60;806;60" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="60;806;60" dur="3.4s" repeatCount="indefinite"/>
  </line>

  <!-- ===================================================================
       STATUS panel (40,300,800x280)
       =================================================================== -->
  <rect x="40" y="300" width="800" height="280" fill="#020A05" stroke="#00FF00" stroke-opacity="0.45" stroke-width="2" rx="3"/>
  <text x="52" y="320" font-size="13" fill="#008000">// STATUS</text>

  <!-- big status line + blinking block cursor -->
  <text x="64" y="372" font-size="40" fill="#00FF00" filter="url(#glow)" letter-spacing="2">&gt;&gt;&gt; PARĀTUS_</text>
  <rect x="372" y="345" width="22" height="34" fill="#00FF00" filter="url(#softglow)">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="64" y="412" font-size="18" fill="#00CC00">NUNC ▸ vocis_20260614_0830.wav   00:42   16kHz · 16-bit · MONO</text>

  <!-- velocity (speed) selector: TARDĒ | NORMĀLIS | CELER -->
  <text x="64" y="468" font-size="18" fill="#008000">VĒLŌCITĀS</text>
  <g>
    <rect x="208" y="448" width="118" height="34" rx="4" fill="#0A0010" stroke="#FF00FF" stroke-width="2"/>
    <text x="267" y="471" font-size="18" fill="#FF00FF" text-anchor="middle">TARDĒ 0.5×</text>

    <rect x="338" y="448" width="138" height="34" rx="4" fill="#00FF00" stroke="#00FF00" stroke-width="2" filter="url(#softglow)"/>
    <text x="407" y="471" font-size="18" fill="#001a00" text-anchor="middle" font-weight="bold">NORMĀLIS 1.0×</text>

    <rect x="488" y="448" width="118" height="34" rx="4" fill="#0A0A00" stroke="#FFFF00" stroke-width="2"/>
    <text x="547" y="471" font-size="18" fill="#FFFF00" text-anchor="middle">CELER 1.5×</text>
  </g>

  <!-- volume (sonitus) slider -->
  <text x="64" y="528" font-size="18" fill="#008000">SONITUS</text>
  <rect x="208" y="516" width="300" height="14" rx="7" fill="#0A1A0E" stroke="#008000" stroke-width="1"/>
  <rect x="208" y="516" width="240" height="14" rx="7" fill="#00FF00" filter="url(#softglow)"/>
  <circle cx="448" cy="523" r="11" fill="#00FFFF" stroke="#001a00" stroke-width="2"/>
  <text x="528" y="528" font-size="18" fill="#00FFFF">80</text>

  <!-- terminal log lines (right column of status panel) -->
  <g font-size="14" fill="#007000">
    <text x="600" y="412">&gt; mic.init ····· OK</text>
    <text x="600" y="436">&gt; sd.mount /sd ·· OK</text>
    <text x="600" y="460">&gt; codec ES8388 ·· OK</text>
    <text x="600" y="484">&gt; 7 recitātiōnēs</text>
    <text x="600" y="508" fill="#00FFFF">&gt; ŌRDŌ: DIĒS ↓</text>
  </g>

  <!-- ===================================================================
       FILE LIST panel (880,80,360x500), item height 50
       =================================================================== -->
  <rect x="880" y="80" width="360" height="500" fill="#020A05" stroke="#00FF00" stroke-opacity="0.45" stroke-width="2" rx="3"/>
  <rect x="880" y="80" width="360" height="44" fill="#04140A"/>
  <text x="894" y="109" font-size="18" fill="#00FF00" filter="url(#glow)">RECITĀTIŌNĒS</text>
  <text x="1226" y="109" font-size="14" fill="#00FFFF" text-anchor="end">DIĒS ↓</text>
  <line x1="880" y1="124" x2="1240" y2="124" stroke="#00FF00" stroke-opacity="0.35"/>

  <!-- selected item (cyan) -->
  <rect x="884" y="128" width="352" height="48" rx="3" fill="#031A1A" stroke="#00FFFF" stroke-width="2"/>
  <text x="898" y="148" font-size="16" fill="#00FFFF">▸ vocis_20260614_0830.wav</text>
  <text x="898" y="168" font-size="13" fill="#00B0B0">1.3MB · 06/14 08:30 · 0:42</text>

  <!-- remaining items (green) -->
  <g>
    <text x="898" y="200" font-size="16" fill="#00FF00">vocis_20260613_2145.wav</text>
    <text x="898" y="220" font-size="13" fill="#007000">2.1MB · 06/13 21:45 · 1:08</text>
    <line x1="896" y1="232" x2="1224" y2="232" stroke="#00FF00" stroke-opacity="0.12"/>

    <text x="898" y="252" font-size="16" fill="#00FF00">vocis_20260613_1900.wav</text>
    <text x="898" y="272" font-size="13" fill="#007000">640KB · 06/13 19:00 · 0:20</text>
    <line x1="896" y1="284" x2="1224" y2="284" stroke="#00FF00" stroke-opacity="0.12"/>

    <text x="898" y="304" font-size="16" fill="#00FF00">vocis_20260612_1132.wav</text>
    <text x="898" y="324" font-size="13" fill="#007000">3.4MB · 06/12 11:32 · 1:48</text>
    <line x1="896" y1="336" x2="1224" y2="336" stroke="#00FF00" stroke-opacity="0.12"/>

    <text x="898" y="356" font-size="16" fill="#00FF00">vocis_20260611_2017.wav</text>
    <text x="898" y="376" font-size="13" fill="#007000">980KB · 06/11 20:17 · 0:31</text>
    <line x1="896" y1="388" x2="1224" y2="388" stroke="#00FF00" stroke-opacity="0.12"/>

    <text x="898" y="408" font-size="16" fill="#00FF00">vocis_20260610_0805.wav</text>
    <text x="898" y="428" font-size="13" fill="#007000">1.7MB · 06/10 08:05 · 0:54</text>
    <line x1="896" y1="440" x2="1224" y2="440" stroke="#00FF00" stroke-opacity="0.12"/>

    <text x="898" y="460" font-size="16" fill="#00FF00">vocis_20260609_1640.wav</text>
    <text x="898" y="480" font-size="13" fill="#007000">512KB · 06/09 16:40 · 0:16</text>
  </g>

  <!-- scrollbar -->
  <rect x="1228" y="128" width="6" height="424" rx="3" fill="#0A1A0E"/>
  <rect x="1228" y="128" width="6" height="120" rx="3" fill="#00FF00" fill-opacity="0.6"/>

  <!-- list footer (total) -->
  <line x1="880" y1="552" x2="1240" y2="552" stroke="#00FF00" stroke-opacity="0.35"/>
  <text x="894" y="571" font-size="14" fill="#008000">Σ 7 · 10.6MB</text>
  <text x="1226" y="571" font-size="14" fill="#00FF00" text-anchor="end">[ NŌVA ▸ SCRĪBE ]</text>

  <!-- ===================================================================
       BUTTON ROW (BUTTON_Y=600). 8 large touch targets, child-friendly.
       =================================================================== -->
  <g font-size="22" text-anchor="middle">
    <!-- SCRĪBE / record (primary, armed red) -->
    <rect x="40" y="605" width="136" height="88" rx="8" fill="#1A0303" stroke="#FF0000" stroke-width="3" filter="url(#softglow)"/>
    <circle cx="108" cy="634" r="6" fill="#FF0000"/>
    <text x="108" y="658" fill="#FF3030" filter="url(#glow)">SCRĪBE</text>
    <text x="108" y="680" font-size="12" fill="#A00000">REC</text>

    <!-- DĒSINE / stop -->
    <rect x="192" y="605" width="136" height="88" rx="8" fill="#06140A" stroke="#FFA500" stroke-width="2"/>
    <rect x="252" y="626" width="12" height="12" fill="#FFA500"/>
    <text x="260" y="658" fill="#FFA500">DĒSINE</text>
    <text x="260" y="680" font-size="12" fill="#9c6600">STOP</text>

    <!-- RECITĀ / play -->
    <rect x="344" y="605" width="136" height="88" rx="8" fill="#06140A" stroke="#00FF00" stroke-width="2"/>
    <path d="M406,626 l14,8 l-14,8 z" fill="#00FF00"/>
    <text x="412" y="658" fill="#00FF00" filter="url(#glow)">RECITĀ</text>
    <text x="412" y="680" font-size="12" fill="#007000">PLAY</text>

    <!-- SERVĀ / save -->
    <rect x="496" y="605" width="136" height="88" rx="8" fill="#06140A" stroke="#00FFFF" stroke-width="2"/>
    <text x="564" y="640" font-size="16" fill="#00FFFF">⤓</text>
    <text x="564" y="664" fill="#00FFFF">SERVĀ</text>
    <text x="564" y="684" font-size="12" fill="#007070">SAVE</text>

    <!-- TARDĒ / slow -->
    <rect x="648" y="605" width="136" height="88" rx="8" fill="#0A0010" stroke="#FF00FF" stroke-width="2"/>
    <text x="716" y="650" fill="#FF00FF">TARDĒ</text>
    <text x="716" y="676" font-size="13" fill="#a000a0">0.5× ▾ gravis</text>

    <!-- CELER / fast -->
    <rect x="800" y="605" width="136" height="88" rx="8" fill="#0A0A00" stroke="#FFFF00" stroke-width="2"/>
    <text x="868" y="650" fill="#FFFF00">CELER</text>
    <text x="868" y="676" font-size="13" fill="#9c9c00">1.5× ▴ acūta</text>

    <!-- ŌRDŌ / sort -->
    <rect x="952" y="605" width="136" height="88" rx="8" fill="#06140A" stroke="#00C000" stroke-width="2"/>
    <text x="1020" y="650" fill="#00C000">ŌRDŌ</text>
    <text x="1020" y="676" font-size="12" fill="#007000">↕ SORT</text>

    <!-- DĒLĒ / delete -->
    <rect x="1104" y="605" width="136" height="88" rx="8" fill="#140303" stroke="#FF0000" stroke-width="2"/>
    <text x="1172" y="650" fill="#FF3030">DĒLĒ</text>
    <text x="1172" y="676" font-size="12" fill="#A00000">✕ DEL</text>
  </g>

  <!-- footer ticker -->
  <text x="640" y="712" font-size="12" fill="#006000" text-anchor="middle" letter-spacing="1">VŌX GRAVIS ◂ TARDĒ · NORMĀLIS · CELER ▸ VŌX ACŪTA      «  certā cum optimīs, morere cum cēterīs  »</text>

  <!-- ===== CRT overlays (drawn last, over everything) ===== -->
  <rect width="1280" height="720" fill="url(#scanlines)" pointer-events="none"/>
  <rect width="1280" height="720" fill="url(#vignette)" pointer-events="none"/>
</svg>
